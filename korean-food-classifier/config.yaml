# ============================================================
# 한국 음식 분류기 설정 파일
# 코드 수정 없이 이 파일만 바꿔서 실험 가능
# ============================================================

# --- 데이터 설정 ---
data:
  # AI Hub 데이터 압축 해제한 경로
  raw_dir: "data/raw"

  # 전처리된 데이터가 저장될 경로
  processed_dir: "data/processed"

  # 사용할 클래스 (비워두면 raw_dir의 모든 폴더 사용)
  # 처음엔 10개 정도로 시작 권장 (학습 빠르고 디버깅 쉬움)
  target_classes:
    - "김치찌개"
    - "된장찌개"
    - "비빔밥"
    - "김밥"
    - "라면"
    - "불고기"
    - "삼겹살"
    - "치킨"
    - "떡볶이"
    - "냉면"

  # train/val/test 비율
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

  # 이미지 사이즈 (MobileNetV2 표준은 224)
  image_size: 224

  # 클래스당 최대 이미지 수 (None이면 전체 사용, 빠른 실험엔 200~500 권장)
  max_images_per_class: 500

# --- 모델 설정 ---
model:
  # 사용할 base model: "mobilenetv2" / "efficientnet_b0" / "resnet50"
  architecture: "mobilenetv2"

  # ImageNet pretrained weight 사용 여부
  use_pretrained: true

  # base model을 freeze 할지 (true면 transfer learning, false면 fine-tuning)
  freeze_base: true

  # classifier head의 dropout
  dropout_rate: 0.3

# --- 학습 설정 ---
training:
  batch_size: 32
  epochs: 20
  learning_rate: 0.001

  # 데이터 증강 사용 여부
  use_augmentation: true

  # Early stopping
  early_stopping_patience: 5

  # 모델 저장 경로
  checkpoint_dir: "models/checkpoints"
  final_model_path: "models/final_model.keras"

# --- TFLite 변환 설정 ---
tflite:
  output_path: "models/model.tflite"
  # 양자화 종류: "none" / "dynamic" / "float16" / "int8"
  # 모바일 배포엔 "dynamic" 또는 "int8" 권장 (사이즈 작음)
  quantization: "dynamic"

# --- 기타 ---
misc:
  random_seed: 42
  num_workers: 4
